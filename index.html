<!DOCTYPE html>
<html class="no-js" lang="en-US">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>StartupStage - bring ideas to life</title>
    <meta name="description" content="StartupStage - bring ideas to life." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="assets/startupstage.ico">

    <!-- Language alternates -->
    <link rel="alternate" hreflang="en-US" href="https://www.startupstage.org/">
    <link rel="alternate" hreflang="en-GB" href="https://www.startupstage.org/en-gb/">
    <link rel="alternate" hreflang="ru-KZ" href="https://www.startupstage.org/ru-kz/">
    <link rel="alternate" hreflang="x-default" href="https://www.startupstage.org/">

    <!-- ========================= CSS here ========================= -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/css/animate.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/custom.css" />

    <!-- FontAwesome JS-->
    <script defer src="assets/fontawesome/js/all.min.js"></script>
</head>

<body>
    <div class="box">
        <!-- Preloader -->
        <div class="preloader">
            <div class="preloader-inner">
                <div class="preloader-icon">
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
        <!-- /End Preloader -->

        <!-- Language Switcher -->
        <div class="language-switcher">
            <button class="language-switcher-btn" onclick="toggleLanguageDropdown(event)" aria-label="Select language">
                <span>English (US)</span>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M2 4L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="language-dropdown">
                <a href="index.html" class="active">English (US)</a>
                <a href="en-gb/index.html">English (UK)</a>
                <a href="ru-kz/index.html">Русский (KZ)</a>
            </div>
        </div>
        <!-- /End Language Switcher -->

        <!-- Start Hero Area -->
        <section id="home" class="hero-area main">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-lg-12 col-md-12 col-12">
                        <div class="hero-content">
                            <h1>Startup<span class="blinking-cursor">Stage</span></h1>
                            <h2>bring ideas to life</h2>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- End Hero Area -->


        <!-- Start Footer Area -->
        <footer class="footer">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12">
                        <div class="single-footer f-about">
                            <p class="copyright-text" style="text-align:center;">
                                <a href="https://www.instagram.com/startup.stage" target="_blank" rel="nofollow" class="social-icons">
                                    <i class="fab fa-instagram"></i>
                                </a>
                            </p>
                            <p class="copyright-text">
                                Copyright © StartupStage <span id="current-year"></span> product by <a href="https://rnda.kz/" target="_blank" rel="noopener" style="color: #ffffff;">RNDA</a><br />
                            </p>
                            <div class="footer-language-switcher">
                                <label for="footer-language-select">Language:</label>
                                <select id="footer-language-select" onchange="changeLanguage(this.value)">
                                    <option value="index.html" selected>English (US)</option>
                                    <option value="en-gb/index.html">English (UK)</option>
                                    <option value="ru-kz/index.html">Русский (KZ)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
        <!--/ End Footer Area -->
    </div>

    <!-- ========================= JS here ========================= -->
    <script src="assets/js/language.js"></script>
    <script>
        window.addEventListener('load', function () {
            window.setTimeout(function () {
                var p = document.querySelector('.preloader');
                if (p) { p.style.opacity = '0'; p.style.display = 'none'; }
            }, 500);
        });
    </script>
</body>

</html>
